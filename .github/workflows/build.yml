name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcb1-dev libxcb-render0-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev \
            libdbus-1-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release
      - name: Strip & package
        run: |
          mkdir -p dist
          cp target/release/keycap dist/
          strip dist/keycap
          tar -czf keycap-linux-x86_64.tar.gz -C dist keycap
      - uses: actions/upload-artifact@v4
        with:
          name: keycap-linux-x86_64
          path: keycap-linux-x86_64.tar.gz

  macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target aarch64-apple-darwin
      - name: Strip & package
        run: |
          mkdir -p dist
          cp target/aarch64-apple-darwin/release/keycap dist/
          strip dist/keycap
          tar -czf keycap-macos-arm64.tar.gz -C dist keycap
      - uses: actions/upload-artifact@v4
        with:
          name: keycap-macos-arm64
          path: keycap-macos-arm64.tar.gz

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: keycap-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/keycap.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, macos-arm64, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: keycap-*
          merge-multiple: false
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            keycap-linux-x86_64/keycap-linux-x86_64.tar.gz
            keycap-macos-arm64/keycap-macos-arm64.tar.gz
            keycap-windows-x86_64/keycap.exe
          draft: true
          generate_release_notes: true
